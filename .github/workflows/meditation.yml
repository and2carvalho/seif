name: SEIF Meditation — Diapasão

# The tuning fork of the protocol.
# Periodic system identification: measures actual behavior vs theoretical model.
# Maps to H(s) = 9/(s² + 3s + 6): excite the system, measure the response.

on:
  schedule:
    # Weekly on Sundays at 03:00 UTC — the protocol meditates
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to check'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - behavioral
          - convergence
          - security
          - staleness

permissions:
  contents: write
  issues: write

jobs:
  meditate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libzbar0 ffmpeg
          pip install -r requirements.txt

      # ── Step 1: Behavioral Fidelity ──
      - name: Behavioral Audit — Model Reliability
        id: behavioral
        env:
          PYTHONPATH: src
        run: |
          python -c "
          import sys, json; sys.path.insert(0, 'src')
          from seif.bridge.model_tracker import (
              load_behavioral_observations, compute_behavioral_stats,
              update_all_profiles, describe_profiles,
          )
          from pathlib import Path

          obs_dir = Path.home() / '.seif' / 'model_observations'
          # Also check repo-local observations
          repo_obs = Path('.seif/model_observations')

          if not obs_dir.exists() and not repo_obs.exists():
              print('No behavioral observations found.')
          else:
              # Update all profiles from both quality and behavioral channels
              results = update_all_profiles()
              for r in results:
                  status = 'updated' if r['updated'] else 'no data'
                  print(f'  {r[\"backend\"]}: {status}')
              print()
              print(describe_profiles())
          "

      # ── Step 2: Profile Staleness ──
      - name: Profile Staleness Check
        id: staleness
        env:
          PYTHONPATH: src
        run: |
          python -c "
          import sys, json; sys.path.insert(0, 'src')
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          models_dir = Path('.seif/models') if Path('.seif/models').exists() else Path.home() / '.seif' / 'models'
          if not models_dir.exists():
              print('No model profiles found.')
              exit(0)

          now = datetime.now(timezone.utc)
          threshold = timedelta(days=7)
          stale = []

          for profile in sorted(models_dir.glob('*.seif')):
              data = json.loads(profile.read_text())
              updated = data.get('updated_at', '')
              contributors = data.get('contributors', [])
              dates = [updated] if updated else []
              for c in contributors:
                  ts = c.get('at') or c.get('timestamp', '')
                  if ts: dates.append(ts)
              if dates:
                  latest = max(dates)
                  try:
                      dt = datetime.fromisoformat(latest.replace('Z', '+00:00'))
                      age = now - dt
                      marker = 'STALE' if age > threshold else 'OK'
                      print(f'  {profile.stem}: {marker} (last: {latest[:10]}, {age.days}d ago)')
                      if age > threshold:
                          stale.append(profile.stem)
                  except ValueError:
                      print(f'  {profile.stem}: UNKNOWN date')
              else:
                  print(f'  {profile.stem}: NEVER updated')
                  stale.append(profile.stem)

          if stale:
              print(f'\n::warning::Stale profiles: {\", \".join(stale)}')
          "

      # ── Step 3: Blue Team Security Audit ──
      - name: Blue Team Security Audit
        id: security
        env:
          PYTHONPATH: src
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from pathlib import Path

          seif_dir = '.seif' if Path('.seif').exists() else str(Path.home() / '.seif')
          if not Path(seif_dir).exists():
              print('No .seif directory found.')
              exit(0)

          from seif.security.redblue import blue_team_audit
          audit = blue_team_audit(seif_dir)
          print(f'Blue Team: {audit.modules_audited} modules, compliance={audit.compliance_score:.1%}, grade={audit.grade()}')
          print(f'  Hash valid: {audit.hash_valid}/{audit.modules_audited}')
          print(f'  Provenance complete: {audit.provenance_complete}/{audit.modules_audited}')
          if audit.issues:
              print(f'  Issues ({len(audit.issues)}):')
              for issue in audit.issues[:10]:
                  print(f'    [!] {issue}')
          if audit.grade() in ('D', 'F'):
              print(f'::error::Security grade {audit.grade()} is below acceptable threshold')
          "

      # ── Step 4: Genesis Convergence (on full runs only) ──
      - name: Genesis Convergence Analysis
        if: github.event.inputs.scope == 'full' || github.event.inputs.scope == 'convergence' || github.event_name == 'schedule'
        env:
          PYTHONPATH: src
        run: |
          # Only run if conversa.md exists in the repo
          if [ -f ".seif/private/conversa.md" ]; then
            python scripts/analyze_genesis.py
          else
            echo "No genesis data found (.seif/private/conversa.md) — skipping convergence analysis"
          fi

      # ── Step 5: Full Meditation Report ──
      - name: Generate Meditation Report
        id: report
        env:
          PYTHONPATH: src
        run: |
          python scripts/meditation.py --output meditation_report.txt --update-profiles
          cat meditation_report.txt

      # ── Step 6: Persist Report ──
      - name: Upload Meditation Report
        uses: actions/upload-artifact@v4
        with:
          name: meditation-report-${{ github.run_id }}
          path: |
            meditation_report.txt
            scripts/genesis_analysis.csv
            scripts/genesis_analysis.json

      # ── Step 7: Create Issue if Attention Needed ──
      - name: Create Issue on Drift
        if: failure() || contains(steps.report.outputs.*, 'ATTENTION')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = 'Meditation report unavailable.';
            try { report = fs.readFileSync('meditation_report.txt', 'utf8'); } catch(e) {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Meditation] System drift detected — ${new Date().toISOString().slice(0,10)}`,
              body: `## SEIF Meditation — Attention Needed\n\n\`\`\`\n${report}\n\`\`\`\n\n---\n*The gate does not filter — it resonates.*`,
              labels: ['meditation', 'protocol-health'],
            });
